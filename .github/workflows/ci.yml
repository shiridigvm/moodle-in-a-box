name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check (theme)
        run: find theme/ -name '*.php' -exec php -l {} \;

      - name: Validate docker-compose
        run: docker compose config --quiet

      - name: Validate production compose
        run: |
          export DOMAIN=test.example.com
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Check shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME_DB_PASSWORD/ci_db_pass_123/' .env
          sed -i 's/CHANGE_ME_ROOT_PASSWORD/ci_root_pass_123/' .env
          sed -i 's/CHANGE_ME_ADMIN_PASSWORD/ci_admin_pass_123/' .env

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for Moodle to be ready
        run: |
          echo "Waiting for Moodle..."
          timeout 300 bash -c 'until curl -sf http://localhost/login/index.php > /dev/null 2>&1; do sleep 5; echo -n "."; done'
          echo " Ready!"

      - name: Run smoke tests
        run: bash tests/smoke-test.sh http://localhost

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v

  upgrade-test:
    name: Upgrade Path Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME_DB_PASSWORD/ci_db_pass_123/' .env
          sed -i 's/CHANGE_ME_ROOT_PASSWORD/ci_root_pass_123/' .env
          sed -i 's/CHANGE_ME_ADMIN_PASSWORD/ci_admin_pass_123/' .env

      - name: Build and start with Moodle 4.4
        run: |
          docker compose build --build-arg MOODLE_BRANCH=MOODLE_404_STABLE
          docker compose up -d
          timeout 300 bash -c 'until curl -sf http://localhost/login/index.php > /dev/null 2>&1; do sleep 5; done'

      - name: Record pre-upgrade version
        run: |
          docker compose exec -T moodle php -r "require('/var/www/html/version.php'); echo 'Pre-upgrade: ' . \$release . PHP_EOL;"

      - name: Upgrade to Moodle 4.5
        run: |
          docker compose exec -T moodle php /var/www/html/admin/cli/maintenance.php --enable
          docker compose build --build-arg MOODLE_BRANCH=MOODLE_405_STABLE moodle
          docker compose stop moodle
          docker compose up -d moodle
          sleep 15
          docker compose exec -T moodle php /var/www/html/admin/cli/upgrade.php --non-interactive
          docker compose exec -T moodle php /var/www/html/admin/cli/maintenance.php --disable

      - name: Verify post-upgrade
        run: |
          docker compose exec -T moodle php -r "require('/var/www/html/version.php'); echo 'Post-upgrade: ' . \$release . PHP_EOL;"
          bash tests/smoke-test.sh http://localhost

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
